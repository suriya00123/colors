
<html>
<head>
    <title>color</title>
</head>
<style>
    .style {
        border: 0.3cm solid black;  /* frame */
        padding: 20px;
        width: 350px;
        margin: auto;
        background-color: yellow;

    }
</style>
<body style="text-align: center;">
    <br><br>
    <h1>Background change color</h1>
    <br>
    <div class="style">
       <input type="text" id="color" placeholder="Enter color" > &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
       <button  onclick="suriya()">change color</button>
    </div>   
    <script>
        function suriya(){
            let value = document.getElementById("color").value;
            document.body.style.background = value;
        }
    </script>

</body>
</html>
